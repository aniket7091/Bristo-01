services:
  # ── Node / Express API ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bristo-app
    restart: unless-stopped
    env_file:
      - .env                     # Reads JWT_SECRET, ImageKit credentials, etc. from .env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/bristo-cafe}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bristo-net
    expose:
      - "5000"

  # ── MongoDB for local Docker Compose runs ─────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: bristo-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - bristo-net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: bristo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - bristo-net

volumes:
  uploads_data:
  mongo_data:

networks:
  bristo-net:
    driver: bridge
